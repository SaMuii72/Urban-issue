services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
